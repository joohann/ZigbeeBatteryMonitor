name: HACS Validatie

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: HACS Validatie
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Validatie
        uses: hacs/action@main
        with:
          category: integration
