name: Lint & Code Kwaliteit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff & Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff installeren
        run: pip install ruff

      - name: Ruff linting
        run: ruff check custom_components/

      - name: Ruff formatting check
        run: ruff format --check custom_components/
